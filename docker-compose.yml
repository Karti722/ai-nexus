services:
  # Vector database (pgvector extension on Postgres). Exposed on the host at
  # 5433, not the default 5432, so it won't clash with any other Postgres
  # instance you might already have running locally.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gruve-postgres
    environment:
      - POSTGRES_USER=gruve
      - POSTGRES_PASSWORD=gruve
      - POSTGRES_DB=gruve_vectors
    ports:
      - "5433:5432"
    volumes:
      - gruve-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gruve -d gruve_vectors"]
      interval: 5s
      timeout: 5s
      retries: 10

  python-service:
    build: ./python-service
    container_name: gruve-embeddings
    ports:
      - "8001:8001"
    environment:
      - EMBEDDING_SERVICE_PORT=8001

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gruve-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-5}
      - PYTHON_EMBEDDING_SERVICE_URL=http://python-service:8001
      - MCP_SERVER_ENTRY=/app/mcp-server/dist/index.js
      - POSTGRES_URL=postgresql://gruve:gruve@postgres:5432/gruve_vectors
    depends_on:
      python-service:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gruve-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  gruve-postgres-data:
